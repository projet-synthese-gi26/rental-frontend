# .github/workflows/build-push.yml
name: Build & Push Rental Frontend

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [container-shell, mfe-agency, mfe-client, mfe-organisation]
        include:
          - app: container-shell
            port: 3000
          - app: mfe-agency
            port: 3000
          - app: mfe-client
            port: 3000
          - app: mfe-organisation
            port: 3000

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ghcr.io/projet-synthese-gi26/rental-${{ matrix.app }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://traefikdev.yowyob.com/rental/
            NEXT_PUBLIC_MFE_AGENCY_URL=https://rental-dev.yowyob.com/agency
            NEXT_PUBLIC_MFE_CLIENT_URL=https://rental-dev.yowyob.com/client
            NEXT_PUBLIC_MFE_ORGANISATION_URL=https://rental-dev.yowyob.com/organisation
